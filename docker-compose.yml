services:
  api:
    build: ./api
    image: dwilson2547/ai-notes-api:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  ui:
    build: ./ui
    image: dwilson2547/ai-notes-ui:latest
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
