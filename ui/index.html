<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Notes</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f3f4f6;
    --surface: #ffffff;
    --sidebar-bg: #f8f9fa;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --danger: #dc2626;
    --tag-bg: #dbeafe;
    --tag-text: #1e40af;
    --archived-bg: #fef9c3;
    --archived-text: #854d0e;
    --card-hover: #f0f4ff;
    --card-selected: #eff6ff;
  }

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg);
         color: var(--text); height: 100vh; display: flex; flex-direction: column;
         overflow: hidden; }

  /* ── Nav ── */
  nav { display: flex; align-items: center; justify-content: space-between;
        padding: .6rem 1.2rem; background: var(--surface); border-bottom: 1px solid var(--border);
        flex-shrink: 0; gap: .75rem; }
  nav .brand { font-weight: 700; font-size: 1.05rem; color: var(--accent); white-space: nowrap; }
  nav .nav-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  nav .count { font-size: .8rem; color: var(--text-muted); }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
             background: var(--sidebar-bg); border-right: 1px solid var(--border);
             overflow: hidden; }
  .sidebar-top { padding: .75rem; display: flex; flex-direction: column; gap: .5rem;
                 border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .search-row { display: flex; gap: .4rem; }
  .search-row input { flex: 1; min-width: 0; }
  .search-row select { width: 100px; flex-shrink: 0; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: .3rem; max-height: 72px; overflow-y: auto; }
  .tag-chip { cursor: pointer; padding: 1px 8px; border-radius: 999px; font-size: .75rem;
              background: var(--border); color: var(--text-muted); border: 1px solid transparent;
              transition: all .15s; user-select: none; }
  .tag-chip.active { background: var(--tag-bg); color: var(--tag-text);
                     border-color: var(--accent); }
  .tag-chip:hover { border-color: var(--accent); }
  .archive-toggle { display: flex; align-items: center; gap: .4rem; font-size: .82rem;
                    color: var(--text-muted); cursor: pointer; user-select: none; }
  .archive-toggle input { cursor: pointer; }

  /* ── Notes list ── */
  .notes-list { flex: 1; overflow-y: auto; padding: .4rem; }
  .note-card { padding: .65rem .75rem; border-radius: 6px; cursor: pointer; margin-bottom: .3rem;
               border: 1px solid transparent; transition: background .12s, border-color .12s; }
  .note-card:hover { background: var(--card-hover); border-color: var(--border); }
  .note-card.selected { background: var(--card-selected); border-color: var(--accent); }
  .note-card.archived { opacity: .7; }
  .note-title { font-weight: 600; font-size: .9rem; margin-bottom: .25rem;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-tags { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .3rem; }
  .tag { padding: 0 6px; border-radius: 999px; font-size: .7rem;
         background: var(--tag-bg); color: var(--tag-text); }
  .archived-badge { padding: 0 6px; border-radius: 999px; font-size: .7rem;
                    background: var(--archived-bg); color: var(--archived-text); }
  .note-preview { font-size: .78rem; color: var(--text-muted); display: -webkit-box;
                  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .note-date { font-size: .72rem; color: #9ca3af; margin-top: .3rem; }
  .note-score { font-size: .72rem; color: var(--accent); margin-top: .2rem; }

  /* ── Main panel ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-content { flex: 1; overflow-y: auto; padding: 1.5rem; }

  /* ── Empty state ── */
  .empty-state { display: flex; flex-direction: column; align-items: center;
                 justify-content: center; height: 100%; gap: 1rem; color: var(--text-muted); }
  .empty-state .big-icon { font-size: 3rem; }

  /* ── Note viewer ── */
  .note-viewer {}
  .viewer-header { display: flex; justify-content: space-between; align-items: flex-start;
                   gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .viewer-title { font-size: 1.4rem; font-weight: 700; flex: 1; }
  .viewer-actions { display: flex; gap: .5rem; flex-shrink: 0; }
  .viewer-meta { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
                 margin-bottom: 1rem; font-size: .82rem; color: var(--text-muted); }
  .viewer-tags { display: flex; gap: .35rem; flex-wrap: wrap; }
  .viewer-content { white-space: pre-wrap; font-family: 'Courier New', monospace;
                    font-size: .9rem; line-height: 1.7; background: #f9fafb;
                    padding: 1rem; border-radius: 6px; border: 1px solid var(--border); }

  /* ── Editor ── */
  .editor { display: flex; flex-direction: column; gap: .85rem; }
  .editor h2 { font-size: 1.15rem; font-weight: 700; }
  .field-label { font-size: .82rem; font-weight: 600; color: var(--text-muted);
                 margin-bottom: .3rem; }
  .editor-actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
                    padding-top: .5rem; border-top: 1px solid var(--border); }
  .spacer { flex: 1; }

  /* ── Inputs ── */
  input[type="text"], input[type="search"], select, textarea {
    width: 100%; padding: .45rem .65rem; border: 1px solid var(--border); border-radius: 5px;
    font-size: .88rem; font-family: inherit; background: var(--surface); color: var(--text);
    outline: none; transition: border-color .15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 300px; font-family: 'Courier New', monospace;
             font-size: .85rem; line-height: 1.6; }

  /* ── Buttons ── */
  button { cursor: pointer; border: none; border-radius: 5px; padding: .4rem .85rem;
           font-size: .85rem; font-family: inherit; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #d1d5db; }
  .btn-danger { background: #fee2e2; color: var(--danger); }
  .btn-danger:hover { background: #fecaca; }
  .btn-warning { background: #fef3c7; color: #92400e; }
  .btn-warning:hover { background: #fde68a; }
  .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
  button:disabled { opacity: .5; cursor: default; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1e293b; color: #fff;
           padding: .6rem 1.1rem; border-radius: 6px; font-size: .85rem; z-index: 100;
           animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  /* ── Error banner ── */
  .error-banner { background: #fee2e2; color: #991b1b; padding: .5rem 1rem;
                  font-size: .85rem; border-bottom: 1px solid #fecaca;
                  display: flex; justify-content: space-between; align-items: center; }

  /* ── Loading ── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%;
             animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-list { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: .85rem; }
</style>
</head>
<body x-data="app()" x-init="init()">

<!-- Error banner -->
<div x-show="error" class="error-banner" x-cloak>
  <span x-text="error"></span>
  <button @click="error=null" class="btn-secondary btn-sm">✕</button>
</div>

<!-- Nav -->
<nav>
  <span class="brand">🗒 AI Notes</span>
  <span class="nav-actions">
    <span class="count" x-show="!loading" x-text="notes.length + ' note' + (notes.length !== 1 ? 's' : '')"></span>
    <span class="spinner" x-show="loading"></span>
    <button class="btn-secondary btn-sm" @click="exportNotes">Export</button>
    <label class="btn-secondary btn-sm" style="cursor:pointer">
      Import
      <input type="file" accept=".json" @change="importNotes" style="display:none" x-ref="importFile">
    </label>
    <button class="btn-primary btn-sm" @click="newNote">+ New Note</button>
  </span>
</nav>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-row">
        <input type="search" x-model="searchQuery" @input.debounce.300ms="fetchNotes"
               placeholder="Search notes…" style="width:auto">
        <select x-model="searchMode" @change="fetchNotes" title="Search mode">
          <option value="text">Text</option>
          <option value="semantic">Semantic</option>
        </select>
      </div>
      <template x-if="allTags.length">
        <div class="tag-cloud">
          <template x-for="tag in allTags" :key="tag">
            <span class="tag-chip" :class="{active: filterTags.includes(tag)}"
                  @click="toggleTag(tag)" x-text="tag"></span>
          </template>
        </div>
      </template>
      <label class="archive-toggle">
        <input type="checkbox" x-model="showArchived" @change="fetchNotes">
        Show archived
      </label>
    </div>

    <div class="notes-list">
      <template x-if="!loading && notes.length === 0">
        <div class="empty-list">No notes found.</div>
      </template>
      <template x-for="item in notes" :key="item.id || item.note?.id">
        <div class="note-card"
             :class="{ selected: selectedId === noteId(item), archived: !!noteData(item).archived_at }"
             @click="selectNote(item)">
          <div class="note-title" x-text="noteData(item).title"></div>
          <div class="note-tags">
            <template x-for="tag in (noteData(item).tags || [])" :key="tag">
              <span class="tag" x-text="tag"></span>
            </template>
            <template x-if="noteData(item).archived_at">
              <span class="archived-badge">archived</span>
            </template>
          </div>
          <div class="note-preview" x-text="noteData(item).content"></div>
          <template x-if="item.score != null">
            <div class="note-score" x-text="'similarity: ' + item.score.toFixed(2)"></div>
          </template>
          <div class="note-date" x-text="formatDate(noteData(item).updated_at)"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-content">

      <!-- Empty state -->
      <template x-if="!editing && !selectedNote">
        <div class="empty-state">
          <span class="big-icon">🗒</span>
          <span>Select a note or create a new one</span>
          <button class="btn-primary" @click="newNote">+ New Note</button>
        </div>
      </template>

      <!-- Note viewer -->
      <template x-if="!editing && selectedNote">
        <div class="note-viewer">
          <div class="viewer-header">
            <div class="viewer-title" x-text="selectedNote.title"></div>
            <div class="viewer-actions">
              <button class="btn-secondary btn-sm" @click="startEdit">Edit</button>
              <button class="btn-warning btn-sm"
                      x-text="selectedNote.archived_at ? 'Unarchive' : 'Archive'"
                      @click="archiveNote(selectedNote.id)"></button>
              <button class="btn-danger btn-sm" @click="deleteNote(selectedNote.id)">Delete</button>
            </div>
          </div>
          <div class="viewer-meta">
            <div class="viewer-tags">
              <template x-for="tag in (selectedNote.tags || [])" :key="tag">
                <span class="tag" x-text="tag"></span>
              </template>
            </div>
            <span x-text="'Updated ' + formatDate(selectedNote.updated_at)"></span>
            <span x-text="'Created ' + formatDate(selectedNote.created_at)"></span>
            <template x-if="selectedNote.archived_at">
              <span class="archived-badge">Archived <span x-text="formatDate(selectedNote.archived_at)"></span></span>
            </template>
          </div>
          <div class="viewer-content" x-text="selectedNote.content"></div>
        </div>
      </template>

      <!-- Editor -->
      <template x-if="editing">
        <div class="editor">
          <h2 x-text="form.id ? 'Edit Note' : 'New Note'"></h2>
          <div>
            <div class="field-label">Title *</div>
            <input type="text" x-model="form.title" placeholder="Short, descriptive title">
          </div>
          <div>
            <div class="field-label">Tags <span style="font-weight:400">(comma-separated)</span></div>
            <input type="text" x-model="form.tagsStr" placeholder="e.g. wordpress, scraping, ajax">
          </div>
          <div>
            <div class="field-label">Content *</div>
            <textarea x-model="form.content"
                      placeholder="Key learnings, patterns, gotchas. Minimal prose — facts that save time."></textarea>
          </div>
          <div class="editor-actions">
            <button class="btn-primary" @click="saveNote" :disabled="loading">
              <span x-show="!loading">Save</span>
              <span x-show="loading"><span class="spinner"></span></span>
            </button>
            <button class="btn-secondary" @click="cancelEdit">Cancel</button>
            <div class="spacer"></div>
            <template x-if="form.id">
              <button class="btn-warning btn-sm"
                      x-text="selectedNote?.archived_at ? 'Unarchive' : 'Archive'"
                      @click="archiveNote(form.id)"></button>
            </template>
            <template x-if="form.id">
              <button class="btn-danger btn-sm" @click="deleteNote(form.id)">Delete</button>
            </template>
          </div>
        </div>
      </template>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" x-show="toast" x-text="toast" x-transition x-cloak></div>

<script>
function app() {
  return {
    notes: [],
    selectedNote: null,
    selectedId: null,
    editing: false,
    form: { id: null, title: '', tagsStr: '', content: '' },
    searchQuery: '',
    searchMode: 'text',
    filterTags: [],
    allTags: [],
    showArchived: false,
    loading: false,
    error: null,
    toast: null,

    async init() {
      await this.fetchNotes();
    },

    // Returns the canonical note object whether list item is a note or SearchResult
    noteData(item) {
      return item.note ?? item;
    },
    noteId(item) {
      return (item.note ?? item).id;
    },

    async fetchNotes() {
      this.loading = true;
      this.error = null;
      try {
        if (this.searchQuery && this.searchMode === 'semantic') {
          const p = new URLSearchParams({ q: this.searchQuery, limit: 50 });
          if (this.filterTags.length) p.set('tags', this.filterTags.join(','));
          if (this.showArchived) p.set('archived', 'true');
          const res = await fetch(`/api/notes/search?${p}`);
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          this.notes = await res.json(); // [{note, score}]
        } else {
          const p = new URLSearchParams({ archived: this.showArchived, limit: 200 });
          if (this.searchQuery) p.set('q', this.searchQuery);
          if (this.filterTags.length) p.set('tags', this.filterTags.join(','));
          const res = await fetch(`/api/notes?${p}`);
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          this.notes = await res.json(); // [note]
        }
        // Rebuild tag cloud from all non-archived notes for discoverability
        await this._refreshTags();
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },

    async _refreshTags() {
      try {
        const res = await fetch('/api/notes?limit=500');
        if (!res.ok) return;
        const all = await res.json();
        const set = new Set();
        all.forEach(n => (n.tags || []).forEach(t => set.add(t)));
        this.allTags = Array.from(set).sort();
      } catch {}
    },

    newNote() {
      this.selectedNote = null;
      this.selectedId = null;
      this.form = { id: null, title: '', tagsStr: '', content: '' };
      this.editing = true;
    },

    selectNote(item) {
      const note = this.noteData(item);
      this.selectedNote = note;
      this.selectedId = note.id;
      this.editing = false;
    },

    startEdit() {
      if (!this.selectedNote) return;
      this.form = {
        id: this.selectedNote.id,
        title: this.selectedNote.title,
        tagsStr: (this.selectedNote.tags || []).join(', '),
        content: this.selectedNote.content,
      };
      this.editing = true;
    },

    cancelEdit() {
      this.editing = false;
    },

    async saveNote() {
      const tags = this.form.tagsStr.split(',').map(t => t.trim()).filter(Boolean);
      const body = { title: this.form.title.trim(), tags, content: this.form.content.trim() };
      if (!body.title) { this.error = 'Title is required'; return; }
      if (!body.content) { this.error = 'Content is required'; return; }

      this.loading = true;
      try {
        const url = this.form.id ? `/api/notes/${this.form.id}` : '/api/notes';
        const method = this.form.id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const saved = await res.json();
        this.selectedNote = saved;
        this.selectedId = saved.id;
        this.editing = false;
        await this.fetchNotes();
        this.showToast('Note saved');
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },

    async deleteNote(id) {
      if (!confirm('Delete this note? This cannot be undone.')) return;
      try {
        const res = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
        if (res.status !== 204 && !res.ok) throw new Error(res.statusText);
        this.selectedNote = null;
        this.selectedId = null;
        this.editing = false;
        await this.fetchNotes();
        this.showToast('Note deleted');
      } catch (e) {
        this.error = e.message;
      }
    },

    async archiveNote(id) {
      try {
        const res = await fetch(`/api/notes/${id}/archive`, { method: 'POST' });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const updated = await res.json();
        this.selectedNote = updated;
        this.editing = false;
        await this.fetchNotes();
        this.showToast(updated.archived_at ? 'Note archived' : 'Note unarchived');
      } catch (e) {
        this.error = e.message;
      }
    },

    async exportNotes() {
      try {
        const res = await fetch('/api/export');
        if (!res.ok) throw new Error(res.statusText);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `notes_export_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Export downloaded');
      } catch (e) {
        this.error = e.message;
      }
    },

    async importNotes(event) {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      let data;
      try { data = JSON.parse(text); } catch { this.error = 'Invalid JSON file'; return; }
      if (!Array.isArray(data)) { this.error = 'Import file must be a JSON array'; return; }

      try {
        const payload = data.map(n => ({
          title: n.title || '',
          tags: Array.isArray(n.tags) ? n.tags : [],
          content: n.content || '',
        }));
        const res = await fetch('/api/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const result = await res.json();
        await this.fetchNotes();
        this.showToast(`Imported ${result.imported} notes`);
      } catch (e) {
        this.error = e.message;
      } finally {
        event.target.value = '';
      }
    },

    toggleTag(tag) {
      const idx = this.filterTags.indexOf(tag);
      if (idx >= 0) this.filterTags.splice(idx, 1);
      else this.filterTags.push(tag);
      this.fetchNotes();
    },

    showToast(msg) {
      this.toast = msg;
      setTimeout(() => { this.toast = null; }, 3000);
    },

    formatDate(dt) {
      if (!dt) return '';
      return new Date(dt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    },
  };
}
</script>
</body>
</html>
